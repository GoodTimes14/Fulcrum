name: Release

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin artifacts
        run: ./gradlew :spigot:shadowJar :bungeecord:shadowJar :velocity:shadowJar

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            spigot/build/libs/fulcrum-spigot-*.jar
            bungeecord/build/libs/fulcrum-bungeecord-*.jar
            velocity/build/libs/fulcrum-velocity-*.jar
