# GitLab CI/CD pipeline for Fulcrum
#
# Converted from the previous GitHub Actions workflows:
#   - .github/workflows/gradle-publish.yml  -> stages: build, publish
#   - .github/workflows/release.yml         -> stage: release
#
# All jobs run on a self-hosted runner registered with the `jdk17` tag, which
# is expected to provide JDK 17 (so we call ./gradlew directly instead of a
# setup-java step).
#
# Required CI/CD variables (Settings > CI/CD > Variables), mirroring the old
# GitHub secrets:
#   NEXUS_URL, NEXUS_REPO_USERNAME, NEXUS_REPO_PASSWORD

stages:
  - build
  - publish
  - release

variables:
  # Keep the Gradle daemon off in CI and pin the user home so caching works.
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

default:
  # Pick up this project's self-hosted runner.
  tags:
    - jdk17
  cache:
    key: "gradle-$CI_COMMIT_REF_SLUG"
    paths:
      - .gradle/caches
      - .gradle/wrapper
  before_script:
    # PublishUtils.kt detects the branch (snapshot vs release) from GITHUB_*
    # env vars. GitLab checks out a detached HEAD, so map the ref name across
    # to keep that logic working.
    - export GITHUB_REF_NAME="$CI_COMMIT_REF_NAME"

build:
  stage: build
  script:
    - ./gradlew build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'

# Mirrors gradle-publish.yml: publish to Nexus on every branch push and tag,
# and allow a manual run from the UI (the old workflow_dispatch trigger).
publish:
  stage: publish
  script:
    - |
      touch gradle.properties
      {
        echo "NEXUS_URL=${NEXUS_URL}"
        echo "NEXUS_REPO_USERNAME=${NEXUS_REPO_USERNAME}"
        echo "NEXUS_REPO_PASSWORD=${NEXUS_REPO_PASSWORD}"
      } >> gradle.properties
    - ./gradlew publish
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual

# Mirrors release.yml: build the platform shadow jars, push them to the
# project's generic package registry, then create a GitLab Release that links
# them. Triggered by pushing a tag (the GitLab analogue of "release created").
release:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - ./gradlew :spigot:shadowJar :bungeecord:shadowJar :velocity:shadowJar
    - |
      PACKAGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/fulcrum/${CI_COMMIT_TAG}"
      ASSET_LINKS=""
      for jar in \
        spigot/build/libs/fulcrum-spigot-*.jar \
        bungeecord/build/libs/fulcrum-bungeecord-*.jar \
        velocity/build/libs/fulcrum-velocity-*.jar; do
        name="$(basename "$jar")"
        echo "Uploading ${name}"
        curl --fail --silent --show-error \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${jar}" \
          "${PACKAGE_URL}/${name}"
        ASSET_LINKS="${ASSET_LINKS}{\"name\":\"${name}\",\"url\":\"${PACKAGE_URL}/${name}\"},"
      done
      ASSET_LINKS="[${ASSET_LINKS%,}]"
      echo "Creating release ${CI_COMMIT_TAG}"
      curl --fail --silent --show-error \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"name\":\"${CI_COMMIT_TAG}\",\"tag_name\":\"${CI_COMMIT_TAG}\",\"assets\":{\"links\":${ASSET_LINKS}}}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"